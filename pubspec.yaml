name: pocket_noc
description: "Network diagnostics and infrastructure toolkit for iOS and Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  fl_chart: ^0.70.2

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.3
  permission_handler: ^11.3.1
  package_info_plus: ^8.1.3

  # PDF generation
  pdf: ^3.11.2

  # JSON
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.9.0
  freezed: ^2.5.7
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
